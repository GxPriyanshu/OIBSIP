<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --bg-light: #f0f4f8;
            --text-dark: #1a1a1a;
            --text-muted: #8e8e93;
            --border-color: #e5e5ea;
            --error-red: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Card Container matching the UI image */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 375px;
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 123, 255, 0.1);
        }

        /* Status Bar Simulation */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .icon-signal {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 10px;
        }
        .icon-signal span {
            width: 3px;
            background: var(--text-dark);
            border-radius: 1px;
        }
        .icon-signal span:nth-child(1) { height: 4px; }
        .icon-signal span:nth-child(2) { height: 7px; }
        .icon-signal span:nth-child(3) { height: 10px; }

        .icon-battery {
            width: 20px;
            height: 10px;
            border: 1px solid var(--text-dark);
            border-radius: 3px;
            position: relative;
            padding: 1px;
        }
        .icon-battery::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 2px;
            width: 2px;
            height: 4px;
            background: var(--text-dark);
            border-radius: 0 1px 1px 0;
        }
        .battery-level {
            height: 100%;
            width: 75%;
            background: var(--text-dark);
            border-radius: 1px;
        }

        /* Main Heading */
        h1 {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 32px;
        }

        /* Input Row (Degrees & Type) */
        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input, select {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 8px 0;
            font-size: 18px;
            color: var(--text-dark);
            background: transparent;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-bottom-color: var(--primary-blue);
        }

        /* Custom dropdown arrow to match the UI image */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper select {
            appearance: none;
            -webkit-appearance: none;
            padding-right: 20px;
        }
        .select-wrapper::after {
            content: '▲';
            font-size: 8px;
            transform: rotate(180deg);
            position: absolute;
            right: 0;
            bottom: 14px;
            color: #666;
            pointer-events: none;
        }

        /* Error Message Styling */
        .error-msg {
            color: var(--error-red);
            font-size: 11px;
            margin-top: 4px;
            min-height: 16px;
        }

        /* Multi-unit Results Area */
        .results-container {
            margin-bottom: 32px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .result-display {
            font-size: 18px;
            color: var(--text-dark);
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            min-height: 38px;
        }

        /* Convert Button */
        .btn-convert {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-convert:hover {
            background-color: #0062cc;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Mock Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <div class="icon-signal"><span></span><span></span><span></span></div>
                <span>&thinsp;⚡&thinsp;</span>
                <div class="icon-battery"><div class="battery-level"></div></div>
            </div>
        </div>

        <h1>Temperature converter</h1>

        <!-- Input Fields -->
        <div class="input-row">
            <div class="form-group">
                <label for="tempInput">Degrees</label>
                <input type="text" id="tempInput" placeholder="Enter value" value="72">
                <div class="error-msg" id="validationError"></div>
            </div>
            
            <div class="form-group">
                <label for="unitSelect">Type</label>
                <div class="select-wrapper">
                    <select id="unitSelect">
                        <option value="Fahrenheit" selected>Fahrenheit</option>
                        <option value="Celsius">Celsius</option>
                        <option value="Kelvin">Kelvin</option>
                    </select>
                </div>
                <div class="error-msg"></div> <!-- Alignment filler -->
            </div>
        </div>

        <!-- Dynamic Output Areas (Shows all units simultaneously as requested) -->
        <div class="results-container">
            <div class="result-item">
                <label id="labelResult1">Result</label>
                <div class="result-display" id="result1">22.2222 °C</div>
            </div>
            <div class="result-item" id="secondaryResultBox">
                <label id="labelResult2">Alternative Unit</label>
                <div class="result-display" id="result2">295.3722 K</div>
            </div>
        </div>

        <button class="btn-convert" id="convertBtn">Convert</button>
    </div>

    <script>
        const tempInput = document.getElementById('tempInput');
        const unitSelect = document.getElementById('unitSelect');
        const convertBtn = document.getElementById('convertBtn');
        const validationError = document.getElementById('validationError');
        
        const result1 = document.getElementById('result1');
        const result2 = document.getElementById('result2');
        const labelResult1 = document.getElementById('labelResult1');
        const labelResult2 = document.getElementById('labelResult2');

        function performConversion() {
            // Clear previous errors
            validationError.innerText = "";
            
            const rawValue = tempInput.value.trim();
            
            // 1. Check for empty input
            if (rawValue === "") {
                validationError.innerText = "Please enter a number.";
                clearDisplays();
                return;
            }

            // 2. Numeric validation (regex handles negative numbers and decimals)
            const numericRegex = /^-?\d*\.?\d+$/;
            if (!numericRegex.test(rawValue)) {
                validationError.innerText = "Error: Non-numeric input.";
                clearDisplays();
                return;
            }

            const inputTemp = parseFloat(rawValue);
            const selectedUnit = unitSelect.value;

            // 3. Absolute Zero Validation Limits
            if (selectedUnit === "Celsius" && inputTemp < -273.15) {
                validationError.innerText = "Below Absolute Zero (-273.15°C)";
                clearDisplays();
                return;
            }
            if (selectedUnit === "Fahrenheit" && inputTemp < -459.67) {
                validationError.innerText = "Below Absolute Zero (-459.67°F)";
                clearDisplays();
                return;
            }
            if (selectedUnit === "Kelvin" && inputTemp < 0) {
                validationError.innerText = "Below Absolute Zero (0 K)";
                clearDisplays();
                return;
            }

            // Conversion Logics
            let c, f, k;

            if (selectedUnit === "Celsius") {
                c = inputTemp;
                f = (c * 9/5) + 32;
                k = c + 273.15;

                labelResult1.innerText = "Fahrenheit";
                result1.innerText = `${formatNumber(f)} °F`;
                labelResult2.innerText = "Kelvin";
                result2.innerText = `${formatNumber(k)} K`;
            } 
            else if (selectedUnit === "Fahrenheit") {
                f = inputTemp;
                c = (f - 32) * 5/9;
                k = c + 273.15;

                labelResult1.innerText = "Result"; // Matches the exact structure of your visual sample
                result1.innerText = `${formatNumber(c)} °C`;
                labelResult2.innerText = "Kelvin";
                result2.innerText = `${formatNumber(k)} K`;
            } 
            else if (selectedUnit === "Kelvin") {
                k = inputTemp;
                c = k - 273.15;
                f = (c * 9/5) + 32;

                labelResult1.innerText = "Celsius";
                result1.innerText = `${formatNumber(c)} °C`;
                labelResult2.innerText = "Fahrenheit";
                result2.innerText = `${formatNumber(f)} °F`;
            }
        }

        function formatNumber(num) {
            // Displays up to 4 decimal places cleanly
            return Number(num.toFixed(4));
        }

        function clearDisplays() {
            result1.innerText = "--";
            result2.innerText = "--";
        }

        // Trigger conversion on button click
        convertBtn.addEventListener('click', performConversion);

        // Real-time input validation checking while typing
        tempInput.addEventListener('input', () => {
            const rawValue = tempInput.value.trim();
            if (rawValue !== "" && !/^-?\d*\.?\d+$/.test(rawValue)) {
                validationError.innerText = "Error: Non-numeric input.";
            } else {
                validationError.innerText = "";
            }
        });

        // Run initially on load to handle default state
        performConversion();
    </script>
</body>
</html>
